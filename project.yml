name: InventarIA
options:
  bundleIdPrefix: com.inventaria
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
    INFOPLIST_KEY_NSCameraUsageDescription: "InventarIA necesita acceso a la cámara para escanear productos y códigos de barras con IA"
    INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "InventarIA necesita acceso a tus fotos para agregar imágenes de productos"

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.0.0"

targets:
  InventarIA:
    type: application
    platform: iOS
    sources:
      - InventarIAApp.swift
      - ContentView.swift
      - Models
      - Services
      - Theme
      - Utils
      - ViewModels
      - Views
      - Assets.xcassets
      - path: GoogleService-Info.plist
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.inventaria.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        DEVELOPMENT_TEAM: ""
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: "YES"
        CODE_SIGNING_ALLOWED: "YES"
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_ENTITLEMENTS: InventarIA.entitlements
    dependencies:
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseCore
